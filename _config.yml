# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: Allan Nava
email: 
bio: A man who loves videogames and coding
description: ""
baseurl: "" # the subpath of your site, e.g. /blog (CI overrides it with --baseurl)
url: "https://allan-nava.github.io" # the base hostname & protocol for your site, e.g. http://example.com
# if it's an external image, update below for true
# better with square images
external-image: false
picture: assets/images/profile.jpg
#
# To enable google analytics, supply your GA4 measurement ID below (G-XXXXXXXXXX).
# The old Universal Analytics property (UA-132362885-1) stopped collecting data
# in July 2023 — create a GA4 property and put its ID here to re-enable tracking.
#analytics-google: ''
#
github_username: Allan-Nava
github: Allan-Nava
instagram: allan_nava
linkedin: allannava
youtube: '@allan_nava'
twitter: allan__nava
dev: allannava
#
#
authors:
  allan:
    name: allan
    bio: A man who loves videogames and coding 
    external-image: false
    picture: assets/images/profile.jpg
#
# do you want a larger site? change the option below
# options: [normal, large] | default: normal
# normal = 560px / large = 810px
width: normal
# if you don't need pagination, comment the *paginate* configs below
# paginate: 5
# paginate_path: "blog/:num/"
# if you don't need projects, comment the *projects* configs below
projects: true
# if you don't need "about" or "blog", comment them out below
about: true
blog: true
# do you want to show the "read time" of the posts?
read-time: true
# do you want to show the "tags" inside the posts?
show-tags: true
# related posts inside a post?
related: true
# Display links for next and previous posts for the specified categories
post-advance-links: [blog]
# show author block at the end of a post ?
show-author: true
#
# do you want some animations?
animation: true
#
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-gist
  - jemoji
  - jekyll-sitemap
#
# Keep internal docs and repo housekeeping files out of the published site.
# Note: in Jekyll 3 setting `exclude` replaces the defaults, so Gemfile/vendor
# and friends are listed explicitly.
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
  - docs
  - CLAUDE.md
  - README.md
  - CODE_OF_CONDUCT.md
  - LICENSE
  - Rakefile
#
