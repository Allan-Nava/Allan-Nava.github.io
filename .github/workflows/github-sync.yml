# Syncs public GitHub repos of the sources in _data/github_sync.yml (user
# Allan-Nava + org hiway-media) into project posts on /projects: creates a post
# for a new repo, and refreshes the post of an existing repo when it changed
# (last push, description, stars). Only generated posts (with a `github:`
# marker) are updated — hand-written ones are never touched. To ban a repo
# permanently, add it to the exclude list in _data/github_sync.yml.
name: GitHub Projects Sync

on:
  schedule:
    # Hourly: pick up newly created/published repos of the configured sources
    # within the hour. The commit step is a no-op when nothing new appears, so
    # a run with no new repos costs nothing (no commit, no deploy).
    - cron: '29 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: "github-sync"
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Generate posts from GitHub repos
        run: ruby scripts/sync_github.rb
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Validate generated posts
        run: ruby scripts/validate_posts.rb
      - name: Commit and push new posts
        id: commit
        run: |
          if [ -z "$(git status --porcelain _posts)" ]; then
            echo "No new posts."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _posts
          git commit -m "Sync project posts from GitHub (new + updated)"
          git push
          echo "pushed=true" >> "$GITHUB_OUTPUT"
      - name: Trigger deploy
        # Pushes made with GITHUB_TOKEN don't fire the push-triggered deploy
        # workflow, so dispatch it explicitly.
        if: steps.commit.outputs.pushed == 'true'
        run: gh workflow run jekyll.yml --ref master
        env:
          GH_TOKEN: ${{ github.token }}
