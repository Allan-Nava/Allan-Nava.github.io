# Creates the versioned backlog milestones (v2.0 → v3.0) and their issues
# from docs/ROADMAP.md. Run it manually from the Actions tab; it is idempotent:
# existing milestones/issues with the same title are skipped, and an existing
# issue whose milestone differs gets moved to the right one. After adding new
# items to ROADMAP.md, mirror them here and re-run — only the new ones are created.
name: Bootstrap milestone

on:
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - name: Create milestones and issues
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const ref = 'Dettagli: [docs/ROADMAP.md](https://github.com/' + owner + '/' + repo + '/blob/master/docs/ROADMAP.md)';

            const BACKLOG = [
              {
                title: 'v2.0', description: 'Performance & Navigazione — urgente dopo il backfill YouTube (218 post, quasi tutti con iframe)',
                issues: [
                  { title: 'Paginazione di /blog',
                    body: 'Riabilitare `paginate: 10` + `paginate_path: "blog/:num/"` in `_config.yml` (il template supporta già il paginatore). Attenzione: `jekyll-paginate` conta anche i post `hidden` — verificare con la CI.' },
                  { title: 'Facade per gli embed YouTube (lite-youtube)',
                    body: 'Ogni iframe carica ~1 MB di JS a pagina aperta; con la facade si carica solo la thumbnail e il player parte al click. Il miglior rapporto valore/sforzo del backlog.' },
                  { title: 'Lazy loading immagini',
                    body: 'Aggiungere `loading="lazy"` alle immagini nei post e nei template (`_includes/`, `_layouts/`).' },
                  { title: 'Thumbnail nei post auto-generati da YouTube',
                    body: 'Usare la thumbnail del video come `image:` nel front matter dei post creati da `scripts/sync_youtube.rb` e `scripts/backfill_youtube.rb` (listing + og:image). Propedeutica alla galleria video (v2.1).' },
                  { title: 'Badge di stato nel README',
                    body: 'Badge dei workflow Deploy e Uptime nel README.' },
                  { title: 'Disinstallare Renovate e chiudere le PR duplicate',
                    body: 'L\'app Renovate duplica Dependabot: disinstallarla da Settings → Integrations e chiudere le sue PR e issue (#25, #43).' },
                ],
              },
              {
                title: 'v2.1', description: 'Contenuti & Engagement',
                issues: [
                  { title: 'Pagina statistiche /stats',
                    body: 'Post per anno, tag più usati, totali; tutto generato in Liquid a build time.' },
                  { title: 'Pagina archivio per anno /archive',
                    body: 'Post raggruppati per anno, Liquid puro, nessun plugin.' },
                  { title: 'Ricerca client-side',
                    body: 'Indice `search.json` generato da Liquid + pagina `/search` con fuzzy match in vanilla JS; con 200+ post serve.' },
                  { title: 'Related posts per tag',
                    body: 'Il box "related" mostra i post più recenti, non i più affini: sostituirlo con un match sui tag condivisi.' },
                  { title: 'Serie di post',
                    body: 'Campo `series:` nel front matter + box "puntata N di M" con navigazione tra gli episodi (es. Flutter Italia Espresso).' },
                  { title: 'Galleria video /videos',
                    body: 'Griglia delle thumbnail di tutti i post YouTube. Dipende dalle thumbnail nel front matter (v2.0).' },
                  { title: '404 intelligente',
                    body: 'Pagina 404 con link utili e ultimi post, per non far rimbalzare chi arriva da un link morto.' },
                  { title: 'Copy-code button',
                    body: 'Bottone "copia" sui blocchi di codice dei post tech (vanilla JS).' },
                  { title: 'Reading progress + scroll-to-top',
                    body: 'Barra di avanzamento lettura in alto e bottone per risalire nei post lunghi.' },
                  { title: 'Commenti con giscus',
                    body: 'GitHub Discussions come sistema di commenti: include `_includes/giscus.html` in `post.html`, toggle in `_config.yml`.' },
                  { title: 'Analytics GA4 o alternativa privacy-friendly',
                    body: 'Property GA4 (`G-XXXX` in `_config.yml`, include gtag già pronto) oppure GoatCounter/Plausible.' },
                ],
              },
              {
                title: 'v2.2', description: 'Automazioni & Platform',
                issues: [
                  { title: 'Modernizzazione stack Ruby',
                    body: 'In sequenza: merge PR Dependabot `github-pages` 211→223→232 (Jekyll 3.10), bump `ruby-version` a 3.3 nei workflow e unpin di `setup-ruby`, poi `html-proofer` 5.x adattando `Rakefile` e i flag CLI in `checks.yml`.' },
                  { title: 'Sync YouTube v2 (descrizione + GPS)',
                    body: 'Descrizione completa del video nel body del post; coordinate GPS dalla descrizione YouTube (formato `📍 lat, lng`) → post geolocalizzato e marker su /map automatico.' },
                  { title: 'Setup secret Strava',
                    body: 'Creare l\'app API Strava e configurare `STRAVA_CLIENT_ID`/`STRAVA_CLIENT_SECRET`/`STRAVA_REFRESH_TOKEN` nei secret per attivare `strava-sync.yml`. Guida passo-passo in docs/deployment.md.' },
                  { title: 'Auto-issue sui fallimenti dei cron',
                    body: 'Step `if: failure()` nei workflow schedulati (sync, deploy, uptime) che apre o aggiorna una issue col link al run fallito.' },
                  { title: 'Link checker mensile',
                    body: 'Workflow schedulato con html-proofer sui link esterni che apre/aggiorna una issue con l\'elenco dei link morti, senza far fallire la CI.' },
                  { title: 'OG image automatica',
                    body: 'Immagine social generata per i post senza `image:` (titolo + data su template).' },
                  { title: 'Newsletter RSS-to-email',
                    body: 'Buttondown/Mailchimp sul `/feed.xml` esistente + form di iscrizione nel footer.' },
                  { title: 'Webmentions',
                    body: 'Like/repost/commenti da Mastodon/Bluesky aggregati sotto i post via brid.gy + webmention.io.' },
                ],
              },
              {
                title: 'v3.0', description: 'Big rocks',
                issues: [
                  { title: 'Migrazione video LFS su YouTube',
                    body: 'Caricare su YouTube i ~39 `.MOV` in `assets/video/` (serviti via `github.com/raw`, quota banda LFS 1 GB/mese), sostituire gli embed nei post, rimuovere `assets/video/` (−700 MB). Opzionale: BFG sulla history (force-push, per ultima).' },
                  { title: 'Dark mode',
                    body: 'Palette scura via `prefers-color-scheme` (+ eventuale toggle) partendo da `_sass/base/variables.sass`.' },
                  { title: 'Ottimizzazione immagini automatica',
                    body: 'WebP/AVIF con fallback, `srcset` responsivo, job CI che comprime le immagini nuove sopra soglia.' },
                  { title: 'PWA',
                    body: 'Manifest + service worker: sito installabile e leggibile offline.' },
                ],
              },
            ];

            const milestones = await github.paginate(github.rest.issues.listMilestones, { owner, repo, state: 'all' });
            const existingIssues = await github.paginate(github.rest.issues.listForRepo, { owner, repo, state: 'all', per_page: 100 });
            const byTitle = new Map(existingIssues.map(i => [i.title, i]));
            let createdIssues = 0, movedIssues = 0;

            for (const group of BACKLOG) {
              let milestone = milestones.find(m => m.title === group.title);
              if (!milestone) {
                milestone = (await github.rest.issues.createMilestone({
                  owner, repo, title: group.title, description: group.description,
                })).data;
                core.info(`Milestone creata: ${group.title} (#${milestone.number})`);
              }

              for (const issue of group.issues) {
                const existing = byTitle.get(issue.title);
                if (existing) {
                  if (!existing.milestone || existing.milestone.number !== milestone.number) {
                    await github.rest.issues.update({ owner, repo, issue_number: existing.number, milestone: milestone.number });
                    movedIssues++;
                    core.info(`spostata in ${group.title}: ${issue.title}`);
                  } else {
                    core.info(`skip (esiste già): ${issue.title}`);
                  }
                  continue;
                }
                await github.rest.issues.create({
                  owner, repo, title: issue.title, body: issue.body + '\n\n' + ref,
                  milestone: milestone.number,
                });
                createdIssues++;
              }
            }
            core.info(`Fatto: ${createdIssues} issue create, ${movedIssues} spostate, ${BACKLOG.length} milestone.`);
