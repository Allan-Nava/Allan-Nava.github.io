name: Uptime Monitor

on:
  schedule:
    # Run every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping_site:
    runs-on: ubuntu-latest
    name: Uptime Check
    steps:
      - name: Ping Site
        run: |
          curl --silent --show-error --fail --output /dev/null \
               --retry 3 --retry-delay 10 --max-time 30 \
               https://allan-nava.github.io/
