# Creates a blog post for every new Strava activity (hike, climb, ...).
# Does nothing (successfully) until the STRAVA_* secrets are configured —
# see docs/deployment.md for the one-time setup.
name: Strava Sync

on:
  schedule:
    - cron: '43 */6 * * *'
  workflow_dispatch:
    inputs:
      max_age_days:
        description: "Sync activities from the last N days"
        required: false
        default: "7"

permissions:
  contents: write
  actions: write

concurrency:
  group: "strava-sync"
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Generate posts from Strava activities
        run: ruby scripts/sync_strava.rb
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
          MAX_AGE_DAYS: ${{ github.event.inputs.max_age_days || '7' }}
      - name: Validate generated posts
        run: ruby scripts/validate_posts.rb
      - name: Commit and push new posts
        id: commit
        run: |
          if [ -z "$(git status --porcelain _posts)" ]; then
            echo "No new posts."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _posts
          git commit -m "Add posts from Strava sync"
          git push
          echo "pushed=true" >> "$GITHUB_OUTPUT"
      - name: Trigger deploy
        # Pushes made with GITHUB_TOKEN don't fire the push-triggered deploy
        # workflow, so dispatch it explicitly.
        if: steps.commit.outputs.pushed == 'true'
        run: gh workflow run jekyll.yml --ref master
        env:
          GH_TOKEN: ${{ github.token }}
