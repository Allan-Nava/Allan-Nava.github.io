# Lighthouse CI: builds the site, serves it locally, and runs Google
# Lighthouse against the main pages, asserting a quality budget defined in
# lighthouserc.json. Runs on every pull request and push to master.
#
# Gating policy (tune in lighthouserc.json):
#   - SEO is a hard gate (error) — jekyll-seo-tag makes it reliably high, so a
#     failure means a real regression (removed meta tags, broken plugin).
#   - performance / accessibility / best-practices start as WARNINGS so the job
#     never red-fails the build on day one. Once the first green runs establish
#     a baseline, promote them to "error" in lighthouserc.json.
name: Lighthouse CI

on:
  pull_request:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Ruby
        # Keep in sync with jekyll.yml / checks.yml (same pinned release, same Ruby).
        uses: ruby/setup-ruby@086ffb1a2090c870a3f881cc91ea83aa4243d408
        with:
          ruby-version: '3.0'
          bundler-cache: true
      - name: Build with Jekyll
        # No --baseurl: this repo is a user page (production baseurl is empty),
        # so the built site is served straight from the root locally.
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Serve built site
        run: |
          npx --yes http-server ./_site -p 8080 --silent &
          npx --yes wait-on -t 30000 http://localhost:8080/
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          # Structural pages only — no individual posts, so the budget is not
          # coupled to content. projects/tags have no trailing-slash permalink,
          # so they are served as .html by the local static server.
          urls: |
            http://localhost:8080/
            http://localhost:8080/blog/
            http://localhost:8080/projects.html
            http://localhost:8080/tags.html
            http://localhost:8080/about/
            http://localhost:8080/map/
            http://localhost:8080/fitness/
            http://localhost:8080/gear/
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
